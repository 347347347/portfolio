<style>

body{background:#0c0e14;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;color:#e5e7eb;min-height:100vh;font-size:15px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-5px);}75%{transform:translateX(5px);}}
button{cursor:pointer;transition:opacity .15s;}

select option{background:#13151e;color:#e5e7eb;}

<script>
// ── constants ──
const CATS=['撮影','デザイン','営業','開発','企画','その他'];
const SKILLS=['初級','中級','上級'];
const SKILL_RANK={初級:1,中級:2,上級:3};
const PRIO=['緊急','高','中','低'];
const PRIO_BG={'緊急':'#ff3b3b18','高':'#ff8c0018','中':'#0077ff18','低':'#1aff8818'};
const PRIO_BD={'緊急':'#ff3b3b','高':'#ff8c00','中':'#0077ff','低':'#1aff88'};
const PRIO_TX={'緊急':'#ff6b6b','高':'#ffaa44','中':'#60a5fa','低':'#1aff88'};
const SKILL_COL={初級:'#94a3b8',中級:'#60a5fa',上級:'#f59e0b'};
const TC=['#3b82f6','#f59e0b','#10b981','#f87171','#a78bfa','#fb923c','#38bdf8','#f472b6','#34d399','#fbbf24'];
const DS=10,DE=19,MAX_FUTURE=14;
const DOW=['日','月','火','水','木','金','土'];
const PRESET_CONDS=['週4~','週5','コスメ機材','ゲーム','ダミヘ','カルマン','力仕事','モデルOK'];

// ── time helpers ──
function fmtT(v){var h=Math.floor(v),m=Math.round((v-h)*60);return ('0'+h).slice(-2)+':'+('0'+m).slice(-2);}
function today0(){var d=new Date();d.setHours(0,0,0,0);return d;}
function addDays(d,n){var r=new Date(d);r.setDate(r.getDate()+n);return r;}
function toKey(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
function fmtDate(d){return (d.getMonth()+1)+'/'+d.getDate()+'('+DOW[d.getDay()]+')';}
var tOpts=[];
for(var _h=DS;_h<=DE;_h++){tOpts.push({l:_h+':00',v:_h});if(_h<DE)tOpts.push({l:_h+':30',v:_h+.5});}

// ── SAMPLE TASKS (used to pre-populate first day) ──
var SAMPLE_TASKS=[
  {id:1,title:'MTG',category:'企画',requiredSkill:'上級',priority:'高',requiredCount:2,startTime:10,endTime:11,conditions:[],equipment:'会議室A',memo:''},
  {id:2,title:'画像編集',category:'撮影',requiredSkill:'上級',priority:'中',requiredCount:1,startTime:10,endTime:19,conditions:['週4~'],equipment:'撮影ブース',memo:''},
  {id:3,title:'LPデザイン作成',category:'デザイン',requiredSkill:'中級',priority:'中',requiredCount:2,startTime:10,endTime:19,conditions:[],equipment:'',memo:''},
  {id:4,title:'勉強会準備',category:'開発',requiredSkill:'中級',priority:'低',requiredCount:1,startTime:14,endTime:16,conditions:[],equipment:'',memo:''},
  {id:5,title:'企画',category:'企画',requiredSkill:'中級',priority:'低',requiredCount:1,startTime:15,endTime:16,conditions:[],equipment:'会議室A',memo:''},
  {id:6,title:'市場調査',category:'企画',requiredSkill:'中級',priority:'中',  requiredCount:1,startTime:10,endTime:14,conditions:[],equipment:'',memo:''},
];

// ── API同期 グローバル ──
var _syncTs = 0; // 最後にサーバーから受信したタイムスタンプ（0=未接続）

// ── state ──
var state={
  members:[
    {id:1, name:'田中 英治',     category:'企画',  skill:'上級',shiftStart:10,shiftEnd:19,conditions:['週4~']},
    {id:2, name:'大橋 辰徳',     category:'デザイン',skill:'上級',shiftStart:10,shiftEnd:19,conditions:[]},
    {id:3, name:'藤川 芳雄',     category:'撮影',  skill:'上級',shiftStart:10,shiftEnd:19,conditions:[]},
    {id:4, name:'齋藤 純三',   category:'開発',skill:'上級',shiftStart:10,shiftEnd:19,conditions:['週5']},
    {id:5, name:'所沢 卓郎',   category:'開発',  skill:'上級',shiftStart:10,shiftEnd:19,conditions:['週5']},
    {id:6, name:'坂本 楓',   category:'営業',  skill:'上級',shiftStart:10,shiftEnd:19,conditions:['']},
    {id:7, name:'徳重 那月',   category:'営業',  skill:'上級',shiftStart:10,shiftEnd:19,conditions:['']},
  ],
  // tasks are now per-day inside dayData[key].tasks[]
  // dayData[dateKey]={tasks:[], attendance:{id:bool}, todayAbsent:{id:bool}, assignments:{taskId:{assignedTo:[],matchScores:{},memo:''}}, memberMemos:{id:str}, shiftOverrides:{id:{start,end}}}
  dayData:{},
  selDate:toKey(today0()),
  tab:'assign',
  calAnchor:null, // set on init
  dragTaskId:null,
  dropMid:null,
  dropOk:true,
  hoverTid:null,
  eqDismissed:{},
  // modals
  editMemberData:null,
  delMemberId:null,
  editTaskData:null,
  // forms
  newTask:{title:'',category:'営業',requiredSkill:'中級',priority:'中',requiredCount:1,startTime:10,endTime:12,conditions:[],equipment:'',memo:''},
  newMember:{name:'',category:'営業',skill:'中級',shiftStart:10,shiftEnd:19,conditions:[]},
  bulkText:'',
  bulkPreview:[],
  showBulk:false,
  showLibrary:false,
  memberSort:'id', // 'id' | 'skill' | 'free'
  rosterSort:'id', // 'id' | 'name' | 'category'
  memberAbsentOverride:{}, // {memberId: manualCount}
  taskLibrary:[], // saved past tasks {id,title,category,requiredSkill,priority,requiredCount,startTime,endTime,conditions,equipment}
};
// init calAnchor = start of this week; seed today with sample tasks
function saveToLibrary(task){
  var key=task.title+'|'+task.category;
  if(!state.taskLibrary.find(function(t){return (t.title+'|'+t.category)===key;})){
    state.taskLibrary.push({
      id:Date.now()+state.taskLibrary.length,title:task.title,category:task.category,requiredSkill:task.requiredSkill,
      priority:task.priority,requiredCount:task.requiredCount,
      startTime:task.startTime,endTime:task.endTime,
      conditions:task.conditions?task.conditions.slice():[],equipment:task.equipment||''
    });
  }
}
(function(){
  var d=today0();d.setDate(d.getDate()-d.getDay());state.calAnchor=d;
  var todayKey=toKey(today0());
  if(!state.dayData[todayKey])
    state.dayData[todayKey]={tasks:JSON.parse(JSON.stringify(SAMPLE_TASKS)),attendance:{},todayAbsent:{},assignments:{},memberMemos:{},shiftOverrides:{}};
  // seed library from samples
  SAMPLE_TASKS.forEach(saveToLibrary);
})();

// ── logic ──
function getDay(key){return state.dayData[key]||{tasks:[],attendance:{},assignments:{},memberMemos:{}};}
function getDayTasks(key){return getDay(key).tasks||[];}
function getAtt(key){return getDay(key).attendance||{};}
function getAsgns(key){return getDay(key).assignments||{};}
function getMemos(key){return getDay(key).memberMemos||{};}
function getTaskAsgn(key,tid){var a=getAsgns(key);return a[tid]||{assignedTo:[],matchScores:{},memo:''};}
function isPresent(key,mid){
  var att=getAtt(key);
  // Explicitly set to false → absent
  if(att[mid]===false) return false;
  // Explicitly set to true → present (overrides auto-absent)
  if(att[mid]===true) return true;
  // Not explicitly set: auto-absent if absentCount >= 10
  var m=state.members.find(function(x){return x.id===mid;});
  if(m&&absentCount(m)>=10) return false;
  return true;
}

function ensureDay(key){
  if(!state.dayData[key])
    state.dayData[key]={tasks:[],attendance:{},todayAbsent:{},assignments:{},memberMemos:{},shiftOverrides:{}};
}

// Get member's effective shift for a specific date (override > last-known > default)
function getEffectiveShift(mid,key){
  var dd=state.dayData[key];
  if(dd&&dd.shiftOverrides&&dd.shiftOverrides[mid])
    return dd.shiftOverrides[mid];
  // look for most recent past date that has an override
  var sortedKeys=Object.keys(state.dayData).filter(function(k){return k<key&&state.dayData[k].shiftOverrides&&state.dayData[k].shiftOverrides[mid];}).sort();
  if(sortedKeys.length){
    var lastKey=sortedKeys[sortedKeys.length-1];
    return state.dayData[lastKey].shiftOverrides[mid];
  }
  // fallback to member default
  var m=state.members.find(function(x){return x.id===mid;});
  return m?{start:m.shiftStart,end:m.shiftEnd}:{start:10,end:19};
}

// Get member object with effective shift for given date (merged)
function getMemberWithShift(m,key){
  var sh=getEffectiveShift(m.id,key);
  return Object.assign({},m,{shiftStart:sh.start,shiftEnd:sh.end});
}

function presentMembers(sortMode,selDate){
  var sort=sortMode||state.memberSort||'id';
  var key=selDate||state.selDate;
  var list=state.members.filter(function(m){return isPresent(key,m.id);});
  if(sort==='skill'){
    list.sort(function(a,b){return SKILL_RANK[b.skill]-SKILL_RANK[a.skill]||a.id-b.id;});
  } else if(sort==='free'){
    // sort by total free hours descending
    list.sort(function(a,b){
      var ma=getMemberWithShift(a,key);
      var mb=getMemberWithShift(b,key);
      var dayTasks=getDayTasks(key);
      var asgns=getAsgns(key);
      var tasksA=dayTasks.filter(function(t){return getTaskAsgn(key,t.id).assignedTo.includes(a.id);});
      var tasksB=dayTasks.filter(function(t){return getTaskAsgn(key,t.id).assignedTo.includes(b.id);});
      var freeA=calcFreeSlots(ma,tasksA).reduce(function(s,f){return s+(f.end-f.start);},0);
      var freeB=calcFreeSlots(mb,tasksB).reduce(function(s,f){return s+(f.end-f.start);},0);
      return freeB-freeA||a.id-b.id;
    });
  } else {
    list.sort(function(a,b){return a.id-b.id;});
  }
  return list;
}
function absentMembers(selDate){
  var key=selDate||state.selDate;
  return state.members.filter(function(m){return !isPresent(key,m.id);}).sort(function(a,b){return a.id-b.id;});
}

function setDay(key,fn){
  ensureDay(key);
  var cur=getDay(key);
  state.dayData[key]=fn(cur);
  // prune
  var lim=toKey(addDays(today0(),MAX_FUTURE));
  Object.keys(state.dayData).forEach(function(k){if(k>lim)delete state.dayData[k];});
}

function canAssign(member,task,dayAssigns,tasks){
  if(!(task.startTime<member.shiftEnd&&task.endTime>member.shiftStart))
    return {ok:false,reason:'勤務時間外'};
  var tids=Object.keys(dayAssigns);
  for(var i=0;i<tids.length;i++){
    var tid=tids[i];
    if(tid==task.id) continue;
    var da=dayAssigns[tid];
    if(!da||!da.assignedTo.includes(member.id)) continue;
    var t=tasks.find(function(x){return x.id==tid;});
    if(!t) continue;
    if(task.startTime<t.endTime&&task.endTime>t.startTime)
      return {ok:false,reason:'「'+t.title.slice(0,8)+'」と時間重複'};
  }
  return {ok:true};
}

function scoreMatch(member,task){
  var s=0;
  var hasTaskCond=task.conditions&&task.conditions.length>0;
  if(hasTaskCond){
    // 条件あるタスクは条件一致を最優先（+10ボーナスでカテゴリ/スキルを必ず上回る）
    var matched=member.conditions
      ?task.conditions.filter(function(c){return member.conditions.includes(c);}).length:0;
    var allMet=matched===task.conditions.length;
    if(allMet) s+=10;          // 完全一致：最優先
    else s+=matched*0.2;        // 部分一致：わずかな加点のみ
  }
  // カテゴリ・スキル加点（条件なしタスクではこれがメイン指標）
  if(member.category===task.category){
    if(member.skill===task.requiredSkill) s+=3;
    else if(SKILL_RANK[member.skill]>=SKILL_RANK[task.requiredSkill]) s+=2;
    else s+=1;
  }
  return s;
}
function condMatch(member,task){
  if(!task.conditions||!task.conditions.length) return null;
  if(!member.conditions||!member.conditions.length) return false;
  return task.conditions.every(function(c){return member.conditions.includes(c);});
}
function matchLabel(score){
  if(score>=13)  return {label:'条件+完全一致',color:'#10b981'};
  if(score>=10)  return {label:'条件一致',color:'#1aff88'};
  if(score>=3)   return {label:'完全一致',color:'#1aff88'};
  if(score>=2)   return {label:'スキル超過',color:'#f59e0b'};
  if(score>=1)   return {label:'カテゴリ一致',color:'#60a5fa'};
  return {label:'代替割当',color:'#f87171'};
}
function getEqConflicts(tasks,dayAssigns){
  var map={};
  tasks.forEach(function(t){
    if(!t.equipment) return;
    var a=dayAssigns[t.id];
    if(!a||!a.assignedTo||!a.assignedTo.length) return;
    t.equipment.split(/[,、・\/]/).map(function(s){return s.trim();}).filter(Boolean).forEach(function(item){
      if(!map[item]) map[item]=[];
      if(!map[item].includes(t.title)) map[item].push(t.title);
    });
  });
  return Object.entries(map).filter(function(e){return e[1].length>1;}).map(function(e){return {eq:e[0],titles:e[1]};});
}

// Compute free slots for a member given their shift and assigned tasks
// Returns array of {start,end} intervals within [shiftStart,shiftEnd] not covered by tasks
function calcFreeSlots(member,taskObjs){
  var s=member.shiftStart,e=member.shiftEnd;
  // clip tasks to shift
  var busy=taskObjs.map(function(t){return {s:Math.max(t.startTime,s),e:Math.min(t.endTime,e)};})
    .filter(function(t){return t.e>t.s;})
    .sort(function(a,b){return a.s-b.s;});
  var free=[],cur=s;
  busy.forEach(function(b){if(b.s>cur)free.push({start:cur,end:b.s});cur=Math.max(cur,b.e);});
  if(cur<e)free.push({start:cur,end:e});
  return free;
}

// ── flash ──
var flashTimer=null;
function showFlash(msg,type){
  if(flashTimer) clearTimeout(flashTimer);
  var area=document.getElementById('flash-area');
  area.innerHTML='<div class="flash '+(type||'s')+'">'+escH(msg)+'</div>';
  flashTimer=setTimeout(function(){area.innerHTML='';},3200);
}

function render(){

  var sy=window.scrollY||window.pageYOffset||0;
  el.innerHTML=buildApp();
  bindEvents();
  window.scrollTo(0,sy);
  requestAnimationFrame(updateTLLabels);
}

        '<span style="font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px;font-weight:700;background:'+(isOnline?'#1aff8815':'#ff3b3b15')+';color:'+(isOnline?'#1aff88':'#f87171')+';border:1px solid '+(isOnline?'#1aff8844':'#ff3b3b44')+';">'+(isOnline?'🟢 サーバー同期中':'🔴 オフライン')+'</span>'+

    '</div>'+
    '<div style="display:flex;gap:8px;">'+

// ── mini date nav (for tasks/members tabs) ──
function buildDateNav(){
  var selD=state.selDate;
  var todayKey=toKey(today0());
  var maxKey=toKey(addDays(today0(),MAX_FUTURE));
  var selDateObj=new Date(selD.replace(/-/g,'/'));
  var prevKey=toKey(addDays(selDateObj,-1));
  var nextKey=toKey(addDays(selDateObj,1));
  var canPrev=prevKey>=todayKey||true; // allow past navigation for reference
  var canNext=nextKey<=maxKey;
  return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">'+
    '<button id="btn-date-prev" class="btn-ghost" style="padding:4px 12px;">‹</button>'+
    '<div style="font-size:18px;font-weight:800;color:'+(selD===todayKey?'#60a5fa':'#e5e7eb')+';">'+fmtDate(selDateObj)+'</div>'+
    '<button id="btn-date-next" class="btn-ghost" style="padding:4px 12px;'+(canNext?'':'opacity:.3;pointer-events:none;')+'">›</button>'+
    '<button id="btn-date-today" style="padding:4px 12px;border-radius:7px;border:1px solid #0077ff44;background:#0077ff11;color:#60a5fa;font-size:15px;font-weight:700;">今日</button>'+
  '</div>';
}

// ── ASSIGN TAB ──
function buildAssignTab(){
  var todayKey=toKey(today0());

          '<button id="btn-sort-skill" style="padding:5px 10px;font-size:15px;font-weight:700;border:none;border-left:1px solid #2a2d3a;background:'+(state.memberSort==='skill'?'#0077ff22':'transparent')+';color:'+(state.memberSort==='skill'?'#60a5fa':'#4b5563')+';">スキル順</button>'+

      buildMembersPanel(pres,abs,asgns,memos,selD,dayTasks)+

}

function buildCalendar(todayKey,maxKey){
  var anchor=state.calAnchor;
  var cells=[];
  for(var i=0;i<21;i++) cells.push(addDays(anchor,i));
  var html='<div class="card" style="margin-bottom:16px;">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">'+
      '<button id="btn-cal-prev" class="btn-ghost" style="padding:4px 12px;font-size:14px;">‹</button>'+
      '<div style="font-size:15px;font-weight:700;color:#9ca3af;">'+anchor.getFullYear()+'年 '+(anchor.getMonth()+1)+'月</div>'+
      '<button id="btn-cal-next" class="btn-ghost" style="padding:4px 12px;font-size:14px;">›</button>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">'+
      DOW.map(function(d,i){return '<div style="text-align:center;font-size:14px;font-weight:700;color:'+(i===0?'#f87171':i===6?'#60a5fa':'#4b5563')+';">'+d+'</div>';}).join('')+
    '</div>'+
    '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
  cells.forEach(function(date){
    var key=toKey(date);
    var isToday=key===todayKey;
    var isSel=key===state.selDate;
    var isPast=key<todayKey;
    var isFut=key>maxKey;
    var dd=state.dayData[key];
    var aCnt=dd?Object.values(dd.assignments||{}).filter(function(a){return a&&a.assignedTo&&a.assignedTo.length>0;}).length:0;
    var abCnt=dd?Object.values(dd.attendance||{}).filter(function(v){return v===false;}).length:0;
    var isSun=date.getDay()===0,isSat=date.getDay()===6;
    var cls='cal-cell'+(isSel?' sel':aCnt>0?' has':isToday?' today':'')+(isPast?' past':'')+(isFut?' disabled':'');
    html+='<div class="'+cls+'" data-caldate="'+key+'">'+
      '<div style="font-size:14px;font-weight:700;color:'+(isToday?'#60a5fa':isSun?'#f87171':isSat?'#60a5fa':'#9ca3af')+';">'+date.getDate()+'</div>'+
      (aCnt>0?'<div style="font-size:15px;color:#1aff88;font-weight:700;">📋'+aCnt+'</div>':'')+
      (abCnt>0?'<div style="font-size:15px;color:#f87171;">✗'+abCnt+'</div>':'')+
    '</div>';
  });
  html+='</div>'+
    '<div style="display:flex;gap:12px;margin-top:8px;font-size:14px;color:#64748b;">'+
      '<span><span style="color:#1aff88;">●</span> 割当あり</span>'+
      '<span><span style="color:#60a5fa;">●</span> 今日</span>'+
      '<span>最大'+MAX_FUTURE+'日先まで可</span>'+
    '</div>'+
  '</div>';
  return html;
}

function buildTasksPanel(asgns,selD,dayTasks){
  var sorted=dayTasks.slice().sort(function(a,b){return PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority);});
  var eqC=getEqConflicts(dayTasks,asgns);
  var html='<div style="display:flex;flex-direction:column;min-height:0;">'+
    '<div style="font-size:14px;font-weight:700;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-bottom:5px;">タスク（ドラッグしてメンバーへ割当）</div>'+
    '<div style="display:flex;flex-direction:column;gap:8px;max-height:calc(100vh - 140px);overflow-y:auto;padding-right:4px;">';
  sorted.forEach(function(task){
    var a=getTaskAsgn(selD,task.id);
    var assignedCnt=a.assignedTo.length;
    var filled=task.requiredCount>0&&assignedCnt>=task.requiredCount;
    var over=task.requiredCount>0&&assignedCnt>task.requiredCount;
    var short=task.requiredCount>0&&assignedCnt>0&&assignedCnt<task.requiredCount;
    var noAssign=task.requiredCount>0&&assignedCnt===0;
    var hasEq=eqC.some(function(c){return c.titles.includes(task.title);});
    var showEqBadge=hasEq&&!state.eqDismissed[selD];
    // condition-unmet: task has conditions but none of the assigned members satisfy all
    var condUnmet=false;
    if(task.conditions&&task.conditions.length&&assignedCnt>0){
      var anyCondOk=a.assignedTo.some(function(mid){
        var m=state.members.find(function(x){return x.id===mid;});
        return m&&task.conditions.every(function(c){return m.conditions&&m.conditions.includes(c);});
      });
      if(!anyCondOk) condUnmet=true;
    }
    var borderCol=over?'#a78bfa':(filled?'#1aff88':(condUnmet?'#f87171':PRIO_BD[task.priority]));
    html+='<div class="card task-drag" draggable="true" data-tid="'+task.id+'" style="border-left:3px solid '+borderCol+';cursor:grab;'+(condUnmet?'background:linear-gradient(135deg,#f8717108,transparent);':'')+''+(showEqBadge?'outline:2px solid #ff8c0055;':'')+'" '+
      'onmouseenter="state.hoverTid='+task.id+';refreshTL();" onmouseleave="state.hoverTid=null;refreshTL();">'+
      '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;">'+
        '<div style="flex:1;">'+
          '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap;">'+
            '<span style="font-size:16px;font-weight:700;color:'+(condUnmet?'#fca5a5':'#e5e7eb')+';">'+escH(task.title)+'</span>'+
            (showEqBadge?'<span style="font-size:15px;padding:1px 6px;border-radius:4px;background:#ff8c0018;color:#ffaa44;border:1px solid #ff8c0055;font-weight:700;">⚠️備品重複</span>':'')+
            (condUnmet?'<span style="font-size:15px;padding:1px 6px;border-radius:4px;background:#f8717122;color:#f87171;border:1px solid #f8717155;font-weight:700;">⚠️条件未達成</span>':'')+
            (over?'<span style="font-size:14px;padding:1px 7px;border-radius:10px;background:#a78bfa22;color:#a78bfa;border:1px solid #a78bfa44;font-weight:700;">超過</span>':'')+
            (filled&&!over?'<span style="font-size:14px;padding:1px 7px;border-radius:10px;background:#1aff8822;color:#1aff88;border:1px solid #1aff8844;font-weight:700;">充足</span>':'')+
            (short?'<span style="font-size:14px;padding:1px 7px;border-radius:10px;background:#f59e0b22;color:#f59e0b;border:1px solid #f59e0b44;font-weight:700;">不足</span>':'')+
            (noAssign?'<span style="font-size:14px;padding:1px 7px;border-radius:10px;background:#6b728022;color:#6b7280;border:1px solid #6b728044;font-weight:700;">未割当</span>':'')+
          '</div>'+
          '<div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center;">'+
            '<span style="font-size:13px;padding:2px 7px;border-radius:4px;background:'+PRIO_BG[task.priority]+';color:'+PRIO_TX[task.priority]+';border:1px solid '+PRIO_BD[task.priority]+'55;font-weight:700;">'+task.priority+'</span>'+
            '<span style="font-size:13px;padding:2px 7px;border-radius:4px;background:#1e2130;color:#9ca3af;border:1px solid #2a2d3a;">'+task.category+'</span>'+
            '<span style="font-size:13px;padding:2px 7px;border-radius:4px;background:#1e2130;color:'+SKILL_COL[task.requiredSkill]+';border:1px solid #2a2d3a;font-weight:700;">'+task.requiredSkill+'以上</span>'+
            '<span style="font-size:13px;padding:2px 7px;border-radius:4px;background:#1e2130;color:#a78bfa;border:1px solid #2a2d3a;font-weight:700;">'+fmtT(task.startTime)+'〜'+fmtT(task.endTime)+'('+( task.endTime-task.startTime)+'h)</span>'+
            '<span style="font-size:13px;padding:2px 9px;border-radius:4px;font-weight:800;background:'+(over?'#a78bfa22':filled?'#1aff8822':short?'#f59e0b22':noAssign?'#6b728022':'#ffffff0d')+';color:'+(over?'#a78bfa':filled?'#1aff88':short?'#f59e0b':noAssign?'#6b7280':'#e5e7eb')+';border:1px solid '+(over?'#a78bfa44':filled?'#1aff8844':short?'#f59e0b44':noAssign?'#6b728044':'#2a2d3a')+';"> 👥'+assignedCnt+'/'+task.requiredCount+'名</span>'+
            (task.equipment?'<span style="font-size:14px;padding:2px 7px;border-radius:4px;background:'+(showEqBadge?'#ff8c0011':'#1e213088')+';color:'+(showEqBadge?'#ffaa44':'#6b7280')+';border:1px solid '+(showEqBadge?'#ff8c0044':'#2a2d3a')+';"> 🔧'+escH(task.equipment)+'</span>':'')+
          '</div>'+
          (task.conditions&&task.conditions.length?'<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;"><span style="font-size:14px;color:#7c8598;margin-right:3px;">条件:</span>'+task.conditions.map(function(c){return '<span class="tag">'+escH(c)+'</span>';}).join('')+'</div>':'')+
        '</div>'+
      '</div>'+
      // assignee badges
      (a.assignedTo.length>0?'<div style="display:flex;flex-wrap:wrap;gap:4px;padding-top:6px;border-top:1px solid #1e2130;margin-bottom:5px;">'+
        a.assignedTo.map(function(mid){
          var m=state.members.find(function(x){return x.id===mid;});
          if(!m) return '';
          var score=a.matchScores[mid];

function buildTL(shiftStart,shiftEnd,taskObjs,freeSlots){
  var span=DE-DS;
  var pct=function(t){return ((t-DS)/span*100).toFixed(2)+'%';};
  var wPct=function(s,e){return ((e-s)/span*100).toFixed(2)+'%';};
  var html='<div class="tl-wrap"><div class="tl-bar" id="tl-bar-inner">'+
    '<div style="position:absolute;left:'+pct(shiftStart)+';width:'+wPct(shiftStart,shiftEnd)+';top:0;height:100%;background:#1e2130;border-radius:3px;"></div>';
  (freeSlots||[]).forEach(function(f){
    if(f.start>=shiftStart&&f.end<=shiftEnd&&f.end>f.start){
      html+='<div class="tl-free" style="left:'+pct(f.start)+';width:'+wPct(f.start,f.end)+';" title="空き '+fmtT(f.start)+'〜'+fmtT(f.end)+'"></div>';
    }
  });
  taskObjs.forEach(function(t,i){
    var isHl=state.hoverTid===t.id;
    var dur=t.endTime-t.startTime; // hours
    // Estimate available pixel width: timeline spans 9h across ~100% of container.
    // We use a JS-side measurement trick via offsetWidth in refreshTL, but here we
    // compute a conservative estimate based on duration ratio of 9h span.
    // At 15px font, each Japanese char ≈ 10px wide; add 4px padding each side.
    var widthRatio=dur/span;
    // We'll embed a data-attr so refreshTL can update labels after DOM is available
    var label=''; // will be computed post-render
    html+='<div class="tl-task-seg" data-tid="'+t.id+'" data-ratio="'+widthRatio.toFixed(4)+'" data-title="'+escH(t.title)+'" '+
      'style="position:absolute;left:'+pct(t.startTime)+';width:'+wPct(t.startTime,t.endTime)+';top:0;height:100%;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;overflow:hidden;white-space:nowrap;padding:0 3px;box-sizing:border-box;background:'+(isHl?'#ff3b3baa':TC[i%TC.length]+'cc')+';color:#fff;" '+
      'title="'+escH(t.title)+' '+fmtT(t.startTime)+'〜'+fmtT(t.endTime)+'">'+
      escH(label)+
    '</div>';
  });
  html+='</div></div>';
  return html;
}
// After rendering, fill in task-segment labels using actual pixel widths
function updateTLLabels(){
  document.querySelectorAll('.tl-bar').forEach(function(bar){
    var barW=bar.offsetWidth||0;
    if(!barW) return;
    bar.querySelectorAll('.tl-task-seg').forEach(function(seg){
      var ratio=parseFloat(seg.dataset.ratio)||0;
      var title=seg.dataset.title||'';
      var segPx=barW*ratio;
      var charPx=9; // 9px font, ~8px per fullwidth char
      var padPx=6;
      var available=segPx-padPx;
      var maxChars=Math.max(0,Math.floor(available/charPx));
      var label='';
      if(maxChars>=1){
        if(title.length<=maxChars) label=title;
        else if(maxChars>1) label=title.slice(0,maxChars-1)+'…';
        else label='…';
      }
      seg.textContent=label;
    });
  });
}

function refreshTL(){
  var pres=presentMembers();
  var selD=state.selDate;
  var dayTasks=getDayTasks(selD);
  pres.forEach(function(m){
    var el=document.querySelector('.drop-target[data-mid="'+m.id+'"] .tl-wrap');
    if(!el) return;
    var ms=getMemberWithShift(m,selD);
    var myTasks=dayTasks.filter(function(t){return getTaskAsgn(selD,t.id).assignedTo.includes(m.id);});
    var freeSlots=calcFreeSlots(ms,myTasks);
    el.outerHTML=buildTL(ms.shiftStart,ms.shiftEnd,myTasks,freeSlots);
  });
  requestAnimationFrame(updateTLLabels);
}

function absentCount(m){
  if(state.memberAbsentOverride&&state.memberAbsentOverride[m.id]!==undefined)
    return state.memberAbsentOverride[m.id];
  return Object.keys(state.dayData).filter(function(k){
    return state.dayData[k].todayAbsent&&state.dayData[k].todayAbsent[m.id]===true;
  }).length;
}
function absentRatePct(m){return String(absentCount(m));}

// ── bind events ──
function bindEvents(){
  // tabs
  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){state.tab=this.dataset.tab;render();});
  });
  // header
  var btnXlsx=document.getElementById('btn-xlsx');
  if(btnXlsx) btnXlsx.addEventListener('click',exportXlsx);
  var btnCsv=document.getElementById('btn-csv');
  if(btnCsv) btnCsv.addEventListener('click',exportCsv);

  if(state.tab==='assign'){
    // sort buttons
    var btnSortId=document.getElementById('btn-sort-id');
    if(btnSortId) btnSortId.addEventListener('click',function(){state.memberSort='id';render();});
    var btnSortSkill=document.getElementById('btn-sort-skill');
    if(btnSortSkill) btnSortSkill.addEventListener('click',function(){state.memberSort='skill';render();});
    var btnSortFree=document.getElementById('btn-sort-free');
    if(btnSortFree) btnSortFree.addEventListener('click',function(){state.memberSort='free';render();});
    // calendar
    document.querySelectorAll('[data-caldate]').forEach(function(el){
      el.addEventListener('click',function(){state.selDate=this.dataset.caldate;render();});
    });
    var prev=document.getElementById('btn-cal-prev');
    if(prev) prev.addEventListener('click',function(){state.calAnchor=addDays(state.calAnchor,-7);render();});
    var next=document.getElementById('btn-cal-next');
    if(next) next.addEventListener('click',function(){state.calAnchor=addDays(state.calAnchor,7);render();});
    // auto/reset
    var btnAuto=document.getElementById('btn-auto');
    if(btnAuto) btnAuto.addEventListener('click',autoAssign);
    var btnReset=document.getElementById('btn-reset');
    if(btnReset) btnReset.addEventListener('click',resetAssign);
    // eq dismiss
    var btnEqD=document.getElementById('btn-eq-dismiss');
    if(btnEqD) btnEqD.addEventListener('click',function(){state.eqDismissed[state.selDate]=true;render();});
    // remove assignee buttons
    document.querySelectorAll('.rm-asgn').forEach(function(btn){
      btn.addEventListener('click',function(e){e.stopPropagation();removeAssignee(Number(this.dataset.tid),Number(this.dataset.mid));});
    });
    // member memos
    document.querySelectorAll('.member-memo').forEach(function(ta){
      ta.addEventListener('change',function(){
        var mid=Number(this.dataset.mid);
        var memo=this.value;
        setDay(state.selDate,function(d){var mm=Object.assign({},d.memberMemos||{});mm[mid]=memo;return Object.assign({},d,{memberMemos:mm});});
      });
    });
    // task memos
    document.querySelectorAll('.task-memo').forEach(function(ta){
      ta.addEventListener('change',function(){
        var tid=Number(this.dataset.tid);
        var memo=this.value;
        setDay(state.selDate,function(d){
          var asgns=Object.assign({},d.assignments);
          var cur=asgns[tid]||{assignedTo:[],matchScores:{},memo:''};
          asgns[tid]=Object.assign({},cur,{memo:memo});
          return Object.assign({},d,{assignments:asgns});
        });
      });
    });
    // drag & drop
    bindDragDrop();
  }

  if(state.tab==='tasks'){
    // date nav
    bindDateNav();
    // copy prev day
    var btnCopyPrev=document.getElementById('btn-copy-prev');

// Snapshot current form inputs back into state before re-render triggered by cond change.
// This prevents form fields being reset when the user toggles a condition tag.
function snapshotFormToState(prefix){
  if(prefix==='nt-cond'){
    var t=document.getElementById('nt-title');        if(t)  state.newTask.title=t.value;
    var c=document.getElementById('nt-category');     if(c)  state.newTask.category=c.value;
    var sk=document.getElementById('nt-skill');       if(sk) state.newTask.requiredSkill=sk.value;
    var pr=document.getElementById('nt-priority');    if(pr) state.newTask.priority=pr.value;
    var cn=document.getElementById('nt-count');       if(cn) state.newTask.requiredCount=Number(cn.value);
    var st=document.getElementById('nt-start');       if(st) state.newTask.startTime=Number(st.value);
    var en=document.getElementById('nt-end');         if(en) state.newTask.endTime=Number(en.value);
    var eq=document.getElementById('nt-equip');       if(eq) state.newTask.equipment=eq.value;
  } else if(prefix==='nm-cond'){
    var n=document.getElementById('nm-name');         if(n)  state.newMember.name=n.value;
    var nc=document.getElementById('nm-category');    if(nc) state.newMember.category=nc.value;
    var ns=document.getElementById('nm-skill');       if(ns) state.newMember.skill=ns.value;
    var ss=document.getElementById('nm-sstart');      if(ss) state.newMember.shiftStart=Number(ss.value);
    var se=document.getElementById('nm-send');        if(se) state.newMember.shiftEnd=Number(se.value);
  } else if(prefix==='em-cond'&&state.editMemberData){
    var en2=document.getElementById('em-name');       if(en2) state.editMemberData.name=en2.value;
    var ec=document.getElementById('em-category');    if(ec)  state.editMemberData.category=ec.value;
    var ess=document.getElementById('em-sstart');     if(ess) state.editMemberData.shiftStart=Number(ess.value);
    var ese=document.getElementById('em-send');       if(ese) state.editMemberData.shiftEnd=Number(ese.value);
    var eab=document.getElementById('em-absent');     if(eab){ if(!state.memberAbsentOverride)state.memberAbsentOverride={}; state.memberAbsentOverride[state.editMemberData.id]=parseInt(eab.value)||0; }
  } else if(prefix==='et-cond'&&state.editTaskData){
    var ett=document.getElementById('et-title');      if(ett)  state.editTaskData.title=ett.value;
    var etc=document.getElementById('et-category');   if(etc)  state.editTaskData.category=etc.value;
    var etsk=document.getElementById('et-skill');     if(etsk) state.editTaskData.requiredSkill=etsk.value;
    var etp=document.getElementById('et-priority');   if(etp)  state.editTaskData.priority=etp.value;
    var etc2=document.getElementById('et-count');     if(etc2) state.editTaskData.requiredCount=Number(etc2.value);
    var ets=document.getElementById('et-start');      if(ets)  state.editTaskData.startTime=Number(ets.value);
    var ete=document.getElementById('et-end');        if(ete)  state.editTaskData.endTime=Number(ete.value);
    var eteq=document.getElementById('et-equip');     if(eteq) state.editTaskData.equipment=eteq.value;
    var etm=document.getElementById('et-memo');       if(etm)  state.editTaskData.memo=etm.value;
  }
}

function bindCondCustom(prefix,onChange,getVal){
  document.querySelectorAll('.cond-custom-del[data-prefix="'+prefix+'"]').forEach(function(btn){
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      snapshotFormToState(prefix);
      var cond=this.dataset.cond;
      var cur=(getVal()||[]).filter(function(c){return c!==cond;});
      onChange(cur);render();
    });
  });
  var addBtn=document.querySelector('.cond-custom-add[data-prefix="'+prefix+'"]');
  if(addBtn) addBtn.addEventListener('click',function(){
    var inp=document.querySelector('.cond-custom-inp[data-prefix="'+prefix+'"]');
    if(!inp) return;
    var val=inp.value.trim();
    if(!val) return;
    snapshotFormToState(prefix);
    var cur=getVal()||[];
    if(!cur.includes(val)){onChange(cur.concat([val]));render();}
    else inp.value='';
  });
}

function bindCondToggles(prefix,onChange){
  document.querySelectorAll('.cond-tog[data-prefix="'+prefix+'"]').forEach(function(btn){
    btn.addEventListener('click',function(){
      snapshotFormToState(prefix);
      var cond=this.dataset.cond;
      var cur;
      if(prefix==='nt-cond') cur=state.newTask.conditions;
      else if(prefix==='nm-cond') cur=state.newMember.conditions;
      else if(prefix==='em-cond') cur=state.editMemberData?state.editMemberData.conditions:[];
      else if(prefix==='et-cond') cur=state.editTaskData?state.editTaskData.conditions:[];
      else cur=[];
      cur=cur||[];
      if(cur.includes(cond)) cur=cur.filter(function(c){return c!==cond;});
      else cur=cur.concat([cond]);
      onChange(cur);
      render();
    });
  });
}

function bindDragDrop(){
  var ghostEl=null;
  document.querySelectorAll('.task-drag').forEach(function(el){
    el.addEventListener('dragstart',function(e){
      state.dragTaskId=Number(this.dataset.tid);
      var task=getDayTasks(state.selDate).find(function(t){return t.id===state.dragTaskId;});
      var g=document.createElement('div');
      g.textContent=task.title.length>20?task.title.slice(0,20)+'…':task.title;
      g.style.cssText='position:fixed;top:-999px;padding:5px 12px;background:#f59e0b;color:#000;border-radius:7px;font-size:14px;font-weight:700;pointer-events:none;';
      document.body.appendChild(g);ghostEl=g;
      e.dataTransfer.setDragImage(g,g.offsetWidth/2,g.offsetHeight/2);
      e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',function(){
      state.dragTaskId=null;state.dropMid=null;state.dropOk=true;
      if(ghostEl){document.body.removeChild(ghostEl);ghostEl=null;}
      document.querySelectorAll('.drop-target').forEach(function(d){d.classList.remove('drop-ok','drop-ng');});
    });
  });
  document.querySelectorAll('.drop-target').forEach(function(el){
    el.addEventListener('dragover',function(e){
      e.preventDefault();
      var mid=Number(this.dataset.mid);
      if(state.dropMid===mid) return;
      state.dropMid=mid;
      document.querySelectorAll('.drop-target').forEach(function(d){d.classList.remove('drop-ok','drop-ng');});
      if(!state.dragTaskId){this.classList.add('drop-ng');return;}
      var task=getDayTasks(state.selDate).find(function(t){return t.id===state.dragTaskId;});
      var member=getMemberWithShift(state.members.find(function(m){return m.id===mid;})||{},state.selDate);
      var asgn=getTaskAsgn(state.selDate,task.id);
      if(!task||!member||asgn.assignedTo.includes(mid)){this.classList.add('drop-ng');return;}
      var chk=canAssign(member,task,getAsgns(state.selDate),getDayTasks(state.selDate));
      this.classList.add(chk.ok?'drop-ok':'drop-ng');
    });
    el.addEventListener('dragleave',function(){
      this.classList.remove('drop-ok','drop-ng');
      state.dropMid=null;
    });
    el.addEventListener('drop',function(e){
      e.preventDefault();
      var mid=Number(this.dataset.mid);
      this.classList.remove('drop-ok','drop-ng');
      state.dropMid=null;
      if(state.dragTaskId) doAddAssignee(state.dragTaskId,mid);
    });
  });
}

function doAddAssignee(taskId,memberId){
  var dayTasks=getDayTasks(state.selDate);
  var task=dayTasks.find(function(t){return t.id===taskId;});
  var member=getMemberWithShift(state.members.find(function(m){return m.id===memberId;})||{},state.selDate);
  if(!task||!member.id) return;
  var a=getTaskAsgn(state.selDate,taskId);
  if(a.assignedTo.includes(memberId)){showFlash(member.name+' はすでに割当済みです','i');return;}
  var chk=canAssign(member,task,getAsgns(state.selDate),dayTasks);
  if(!chk.ok){showFlash('割当不可：'+member.name+' — '+chk.reason,'e');return;}
  var score=scoreMatch(member,task);
  setDay(state.selDate,function(d){
    var asgns=Object.assign({},d.assignments);
    var cur=asgns[taskId]||{assignedTo:[],matchScores:{},memo:''};
    var ms=Object.assign({},cur.matchScores);
    ms[memberId]=score;
    asgns[taskId]={assignedTo:cur.assignedTo.concat([memberId]),matchScores:ms,memo:cur.memo||''};
    return Object.assign({},d,{assignments:asgns});
  });
  showFlash(member.name+' を割当しました','s');
  render();
}

function removeAssignee(taskId,memberId){
  setDay(state.selDate,function(d){
    var asgns=Object.assign({},d.assignments);
    var cur=asgns[taskId]||{assignedTo:[],matchScores:{},memo:''};
    var ms=Object.assign({},cur.matchScores);
    delete ms[memberId];
    asgns[taskId]={assignedTo:cur.assignedTo.filter(function(x){return x!==memberId;}),matchScores:ms,memo:cur.memo||''};
    return Object.assign({},d,{assignments:asgns});
  });
  render();
}

function autoAssign(){
  var selD=state.selDate;
  var pres=presentMembers().map(function(m){return getMemberWithShift(m,selD);});
  var dayTasks=getDayTasks(selD);
  // 不足タスクを優先度順に
  var toAssign=dayTasks.filter(function(t){return t.requiredCount>0&&getTaskAsgn(selD,t.id).assignedTo.length<t.requiredCount;})
    .sort(function(a,b){return PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority);});
  if(!toAssign.length){showFlash('未割当タスクがありません','i');return;}

  var newAsgns={};
  dayTasks.forEach(function(t){
    var a=getTaskAsgn(selD,t.id);
    newAsgns[t.id]={assignedTo:a.assignedTo.slice(),matchScores:Object.assign({},a.matchScores),memo:a.memo||''};
  });

  // ── ステップ1: まず各タスクに1人目（最高スコア候補）を割り当てる ──
  var total=0,skipped=0;
  toAssign.forEach(function(task){
    var da=newAsgns[task.id];
    if(da.assignedTo.length>0) return; // 既に1人以上いる
    var cands=pres.filter(function(m){return !da.assignedTo.includes(m.id)&&canAssign(m,task,newAsgns,dayTasks).ok;})
      .map(function(m){
        var origM=state.members.find(function(x){return x.id===m.id;});
        var penalty=origM?absentCount(origM)*0.3:0;
        return {m:m,score:scoreMatch(m,task)-penalty};
      })
      .sort(function(a,b){return b.score-a.score;});
    if(cands.length){
      var p=cands[0];
      da.assignedTo.push(p.m.id);da.matchScores[p.m.id]=p.score;total++;
    } else {
      skipped++;
    }
  });

  // ── ステップ2: まだ不足しているタスクに追加割当 ──
  //   優先度: 必要人数が少ない（=1）タスクを先に充足させる
  //   2人目以降の割当前に、requiredCount=1 の未充足タスクを確認し
  //   そちらを優先する（greedy on remaining needs）
  var filled=false;
  while(!filled){
    // 残り必要数でソート（少ない順 → 同じなら優先度順）
    var remaining=toAssign.filter(function(t){
      return newAsgns[t.id].assignedTo.length<t.requiredCount;
    }).sort(function(a,b){
      var remA=a.requiredCount-newAsgns[a.id].assignedTo.length;
      var remB=b.requiredCount-newAsgns[b.id].assignedTo.length;
      if(remA!==remB) return remA-remB; // 残り人数少ない順
      return PRIO.indexOf(a.priority)-PRIO.indexOf(b.priority);
    });
    if(!remaining.length){filled=true;break;}
    var progress=false;
    for(var i=0;i<remaining.length;i++){
      var task=remaining[i];
      var da=newAsgns[task.id];
      var cands=pres.filter(function(m){return !da.assignedTo.includes(m.id)&&canAssign(m,task,newAsgns,dayTasks).ok;})
        .map(function(m){
          var origM=state.members.find(function(x){return x.id===m.id;});
          var penalty=origM?absentCount(origM)*0.3:0;
          return {m:m,score:scoreMatch(m,task)-penalty};
        })
        .sort(function(a,b){return b.score-a.score;});
      if(cands.length){
        var p=cands[0];
        da.assignedTo.push(p.m.id);da.matchScores[p.m.id]=p.score;total++;progress=true;
        break; // 1人割り当てたら再ソート（残りが変わるので最初から）
      } else {
        skipped++;
        // このタスクへの追加割当は不可能なので除外
        toAssign=toAssign.filter(function(t){return t.id!==task.id;});
        progress=true;
        break;
      }
    }
    if(!progress) break;
  }

  setDay(selD,function(d){return Object.assign({},d,{assignments:Object.assign({},d.assignments,newAsgns)});});
  showFlash(skipped?total+'名割当完了（'+skipped+'名分は制約で割当不可）':total+'名の割当を完了しました',skipped?'i':'s');
  render();
}

function copyPrevDayTasks(){
  var selD=state.selDate;
  var prevKey=toKey(addDays(new Date(selD.replace(/-/g,'/')),- 1));
  var prevTasks=getDayTasks(prevKey);
  if(!prevTasks.length){showFlash('前日にタスクがありません','i');return;}
  // copy with new IDs, clear assignments
  var copies=prevTasks.map(function(t,i){return Object.assign({},JSON.parse(JSON.stringify(t)),{id:Date.now()+i});});
  setDay(selD,function(d){
    return Object.assign({},d,{tasks:d.tasks.concat(copies)});
  });
  showFlash(copies.length+'件のタスクをコピーしました','s');render();
}

function addTask(){
  var title=document.getElementById('nt-title').value.trim();
  if(!title){showFlash('タスク名を入力してください','e');return;}
  var st=Number(document.getElementById('nt-start').value);
  var et=Number(document.getElementById('nt-end').value);
  if(st>=et){showFlash('終了時刻は開始時刻より後にしてください','e');return;}
  var newT={
    id:Date.now(),
    title:title,
    category:document.getElementById('nt-category').value,
    requiredSkill:document.getElementById('nt-skill').value,
    priority:document.getElementById('nt-priority').value,
    requiredCount:Math.max(0,Number(document.getElementById('nt-count').value)||0),
    startTime:st,endTime:et,
    conditions:state.newTask.conditions.slice(),
    equipment:document.getElementById('nt-equip').value,
    memo:''
  };
  setDay(state.selDate,function(d){return Object.assign({},d,{tasks:(d.tasks||[]).concat([newT])});});
  saveToLibrary(newT);
  state.newTask={title:'',category:'営業',requiredSkill:'中級',priority:'中',requiredCount:1,startTime:10,endTime:12,conditions:[],equipment:'',memo:''};
  showFlash('タスクを追加しました','s');render();
}

function saveTask(){
  var et=state.editTaskData;
  var title=document.getElementById('et-title').value.trim();
  if(!title){showFlash('タスク名を入力してください','e');return;}
  var st=Number(document.getElementById('et-start').value);
  var end=Number(document.getElementById('et-end').value);
  if(st>=end){showFlash('終了時刻は開始時刻より後にしてください','e');return;}
  var updated=Object.assign({},et,{
    title:title,
    category:document.getElementById('et-category').value,
    requiredSkill:document.getElementById('et-skill').value,
    priority:document.getElementById('et-priority').value,
    requiredCount:Math.max(0,Number(document.getElementById('et-count').value)||0),
    startTime:st,endTime:end,
    equipment:document.getElementById('et-equip').value,
    conditions:et.conditions,
    memo:document.getElementById('et-memo').value
  });
  setDay(state.selDate,function(d){
    return Object.assign({},d,{tasks:(d.tasks||[]).map(function(t){return t.id===et.id?updated:t;})});
  });
  state.editTaskData=null;
  showFlash('タスク情報を更新しました','s');render();
}

function addMember(){
  var name=document.getElementById('nm-name').value.trim();
  if(!name){showFlash('氏名を入力してください','e');return;}
  var ss=Number(document.getElementById('nm-sstart').value);
  var se=Number(document.getElementById('nm-send').value);
  if(ss>=se){showFlash('終了時刻は開始時刻より後にしてください','e');return;}
  var maxId=state.members.reduce(function(mx,m){return Math.max(mx,m.id);},0);
  state.members.push({
    id:maxId+1,name:name,
    category:document.getElementById('nm-category').value,
    skill:document.getElementById('nm-skill').value,
    shiftStart:ss,shiftEnd:se,
    conditions:state.newMember.conditions.slice()
  });
  state.newMember={name:'',category:'営業',skill:'中級',shiftStart:10,shiftEnd:19,conditions:[]};
  showFlash('メンバーを追加しました（ID:'+(maxId+1)+'）','s');render();
}

function saveMember(){
  var em=state.editMemberData;
  var name=document.getElementById('em-name').value.trim();
  if(!name){showFlash('氏名を入力してください','e');return;}
  // Save absent count override
  var absentEl=document.getElementById('em-absent');
  if(absentEl){
    if(!state.memberAbsentOverride) state.memberAbsentOverride={};
    state.memberAbsentOverride[em.id]=Math.max(0,parseInt(absentEl.value)||0);
  }
  state.members=state.members.map(function(m){
    if(m.id!==em.id) return m;
    return Object.assign({},m,{
      name:name,
      category:document.getElementById('em-category').value,
      skill:em.skill,
      shiftStart:Number(document.getElementById('em-sstart').value),
      shiftEnd:Number(document.getElementById('em-send').value),
      conditions:em.conditions
    });
  });
  state.editMemberData=null;
  showFlash('メンバー情報を更新しました','s');render();
}

function deleteMember(id){
  state.members=state.members.filter(function(m){return m.id!==id;});
  Object.keys(state.dayData).forEach(function(dk){
    var dd=state.dayData[dk];
    var asgns=Object.assign({},dd.assignments||{});
    Object.keys(asgns).forEach(function(tid){
      var a=asgns[tid];
      var ms=Object.assign({},a.matchScores);
      delete ms[id];
      asgns[tid]={assignedTo:a.assignedTo.filter(function(x){return x!==id;}),matchScores:ms,memo:a.memo||''};
    });
    state.dayData[dk]=Object.assign({},dd,{assignments:asgns});
  });
  state.delMemberId=null;
  showFlash('メンバーを削除しました','i');render();
}

function parseBulk(text){
  var rows=text.trim().split('\n').map(function(r){return r.split('\t').map(function(c){return c.trim();});});
  var prev=[];
  rows.forEach(function(r){
    if(r.length<2) return;
    var title=r[0],cat=r[1],skill=r[2],prio=r[3],cnt=r[4],sh=r[5],eh=r[6],conds=r[7],equip=r[8];
    if(!title) return;
    prev.push({title:title,
      category:CATS.includes(cat)?cat:CATS[0],
      requiredSkill:SKILLS.includes(skill)?skill:'中級',
      priority:PRIO.includes(prio)?prio:'中',
      requiredCount:Math.max(1,parseInt(cnt)||1),
      startTime:Math.min(DE-.5,Math.max(DS,parseFloat(sh)||DS)),
      endTime:Math.min(DE,Math.max(DS+.5,parseFloat(eh)||(DS+1))),
      conditions:conds?conds.split(',').map(function(c){return c.trim();}).filter(Boolean):[],
      equipment:equip||''});
  });
  state.bulkPreview=prev;
}

function commitBulk(){
  var copies=state.bulkPreview.map(function(t,i){return Object.assign({},t,{id:Date.now()+i,memo:''});});
  setDay(state.selDate,function(d){return Object.assign({},d,{tasks:(d.tasks||[]).concat(copies)});});
  copies.forEach(saveToLibrary);
  var cnt=copies.length;
  state.bulkText='';state.bulkPreview=[];state.showBulk=false;
  showFlash(cnt+'件のタスクを追加しました','s');render();
}

function exportXlsx(){
  var wb=XLSX.utils.book_new();
  // Sheet 1: 指定フォーマット A:日付(初行のみ) B:メンバー C:勤務時間 D:タスク時間帯 E:担当タスク
  var rows=[['日付','メンバー','勤務時間','タスク時間帯','担当タスク']];
  Object.keys(state.dayData).sort().forEach(function(dk){
    var dd=state.dayData[dk];
    var dayTasks=dd.tasks||[];
    var firstInDay=true;
    state.members.forEach(function(m){
      var pres=dd.attendance?dd.attendance[m.id]!==false:true;
      if(!pres) return;
      var sh=dd.shiftOverrides&&dd.shiftOverrides[m.id]?dd.shiftOverrides[m.id]:{start:m.shiftStart,end:m.shiftEnd};
      var shiftStr=fmtT(sh.start)+'〜'+fmtT(sh.end);
      var myTasks=dayTasks.filter(function(t){return (dd.assignments&&dd.assignments[t.id]&&dd.assignments[t.id].assignedTo||[]).includes(m.id);});
      if(!myTasks.length){
        rows.push([firstInDay?dk:'',m.name,shiftStr,'','（未割当）']);
        firstInDay=false;
      } else {
        myTasks.forEach(function(t){
          rows.push([firstInDay?dk:'',m.name,shiftStr,fmtT(t.startTime)+'〜'+fmtT(t.endTime),t.title]);
          firstInDay=false;
        });
      }
    });
  });
  var ws=XLSX.utils.aoa_to_sheet(rows);
  // Style header row (col widths)
  ws['!cols']=[{wch:12},{wch:14},{wch:14},{wch:14},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'割当結果');
  XLSX.writeFile(wb,'task-allocation.xlsx');
  showFlash('Excelファイルをダウンロードしました','s');
}

function exportCsv(){
  function esc(v){return '"'+String(v).replace(/"/g,'""')+'"';}
  var rows=[['日付','メンバー','担当タスク','タスク時間帯','一致ラベル','条件一致'].map(esc).join(',')];
  Object.keys(state.dayData).sort().forEach(function(dk){
    var dd=state.dayData[dk];
    var dayTasks=dd.tasks||[];
    state.members.forEach(function(m){
      var pres=dd.attendance?dd.attendance[m.id]!==false:true;
      if(!pres) return;
      var myTasks=dayTasks.filter(function(t){return (dd.assignments&&dd.assignments[t.id]&&dd.assignments[t.id].assignedTo||[]).includes(m.id);});
      if(!myTasks.length){rows.push([dk,m.name,'（未割当）','','',''].map(esc).join(','));return;}
      myTasks.forEach(function(t){
        var score=(dd.assignments[t.id].matchScores||{})[m.id];
        var ml=score!==undefined?matchLabel(score).label:'';
        var cm=condMatch(m,t);
        rows.push([dk,m.name,t.title,fmtT(t.startTime)+'〜'+fmtT(t.endTime),ml,cm===true?'一致':cm===false?'不一致':'—'].map(esc).join(','));
      });
    });
  });
  var csv='\uFEFF'+rows.join('\r\n');
  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='task-allocation.csv';a.click();
  showFlash('CSVファイルをダウンロードしました','s');
}

function escH(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── API同期レイヤー ──────────────────────────────────────────────────────
var _saveTimer = null;

function apiFetch(path, opts){
  return fetch(path, Object.assign({headers:{'Content-Type':'application/json'}}, opts||{}));
}

function loadFromServer(silent){
  return apiFetch('/api/state').then(function(r){return r.json();}).then(function(data){
    if(data.members && data.members.length) state.members = data.members;
    if(data.dayData){
      Object.keys(data.dayData).forEach(function(dk){ state.dayData[dk]=data.dayData[dk]; });
    }
    if(data.taskLibrary) state.taskLibrary = data.taskLibrary;
    if(data.memberAbsentOverride) state.memberAbsentOverride = data.memberAbsentOverride;
    _syncTs = data.lastModified || Date.now();
    if(!silent) _origRender();
    return data;
  }).catch(function(e){ console.warn('loadFromServer失敗:', e); });
}

function scheduleSync(){
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer = setTimeout(pushToServer, 600);
}

function pushToServer(){
  var p1=apiFetch('/api/members',{method:'POST',body:JSON.stringify(state.members)});
  var p2=apiFetch('/api/daydata',{method:'POST',body:JSON.stringify(state.dayData)});
  var p3=apiFetch('/api/library',{method:'POST',body:JSON.stringify(state.taskLibrary)});
  var p4=apiFetch('/api/absent-override',{method:'POST',body:JSON.stringify(state.memberAbsentOverride||{})});
  return Promise.all([p1,p2,p3,p4]).then(function(){ _syncTs=Date.now(); })
    .catch(function(e){ console.warn('pushToServer失敗:', e); });
}

function startPolling(){
  setInterval(function(){
    apiFetch('/api/ping?ts='+_syncTs).then(function(r){return r.json();}).then(function(d){
      if(d.changed) loadFromServer(false);
    }).catch(function(){});
  }, 3000);
}

// renderをラップしてサーバー自動保存
var _origRender = render;
render = function(){
  _origRender();
  scheduleSync();
};

// ── init ──
(function(){
  var d=today0(); d.setDate(d.getDate()-d.getDay()); state.calAnchor=d;
  loadFromServer(true).then(function(){
    var todayKey=toKey(today0());
    if(!state.dayData[todayKey]){
      state.dayData[todayKey]={tasks:JSON.parse(JSON.stringify(SAMPLE_TASKS)),attendance:{},todayAbsent:{},assignments:{},memberMemos:{},shiftOverrides:{}};
      SAMPLE_TASKS.forEach(saveToLibrary);
    }
    _origRender();
    startPolling();
  }).catch(function(){
    // サーバーなし → スタンドアロン動作
    var todayKey=toKey(today0());
    if(!state.dayData[todayKey]){
      state.dayData[todayKey]={tasks:JSON.parse(JSON.stringify(SAMPLE_TASKS)),attendance:{},todayAbsent:{},assignments:{},memberMemos:{},shiftOverrides:{}};
      SAMPLE_TASKS.forEach(saveToLibrary);
    }
    render();
    showFlash('⚠️ サーバーに接続できません。スタンドアロンモードで動作中', 'e');
  });
})();
</script>
